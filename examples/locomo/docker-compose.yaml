services:
  # 只走国内 DaoCloud 白名单镜像；内置 Browser 一起用，不再额外拉 falkordb-browser
  falkordb:
    image: docker.m.daocloud.io/falkordb/falkordb:latest
    ports:
      # 数据库端口；内置 Browser(3000) 在当前镜像里有问题，可视化改用 API: http://host:18003/memory/ui
      - "18004:6379"
    environment:
      BROWSER: "1"
      ENCRYPTION_KEY: ${FALKORDB_ENCRYPTION_KEY:-graphiti-local-encryption-key}
      # FalkorDB 图查询超时，单位毫秒；默认值过短时 Graphiti 全文检索容易被终止
      FALKORDB_ARGS: "TIMEOUT 3000000"
    volumes:
      # 只持久化图谱数据；Browser UI 每次连库加载，不单独持久化
      - /data/graphti/falkordb:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  memory-api:
    build:
      context: ../..
      dockerfile: examples/locomo/Dockerfile
    env_file:
      - .env
    environment:
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: "6379"
      MEMORY_API_HOST: 0.0.0.0
      MEMORY_API_PORT: "8000"
    ports:
      - "18003:8000"
    volumes:
      - /data/graphti/register_progress:/app/examples/locomo/data/register_progress
    depends_on:
      falkordb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "--no-sync",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
